# BOTB — the WHOLE application in one command.
#
#   cp .env.example .env            # optional; every value has a safe default
#   docker compose up -d --build
#
# Brings up, in order:
#   postgresql + minio  (infra)                      -> healthy
#   migrate             (all migrations, up)         -> one-shot
#   createbuckets       (media bucket + public read) -> one-shot
#   seed                (sample data -> Postgres+MinIO) -> one-shot, idempotent
#   competition/user/draw/media/adminauth  (internal only)
#   gateway             (the ONLY public API port, 8080)
#   frontend            (Next.js site, public port 3000)
#
# Open http://localhost:3000 for the site and http://localhost:8080 for the API.
# The five Go services are built from ./backend/Dockerfile, one binary each via
# the SERVICE build-arg (gateway|competition|user|draw|media|seed) — NOT the
# template's example service. The frontend is built from ./Dockerfile (Next.js
# standalone) and talks to the gateway.
name: botb

include:
  - backend/infra/compose/datasource/postgresql.yaml
  - backend/infra/compose/datasource/minio.yaml

# --------------------------------------------------------------------------
# Shared config for every Go service (koanf APP_* overrides). jwt.secret is
# defined ONCE and shared by the gateway, all services AND adminauth: adminauth
# SIGNS admin tokens with it and every guard VERIFIES with it, so the two-layer
# role check agrees end to end. The frontend does NOT get this secret.
# --------------------------------------------------------------------------
x-service-env: &service-env
  APP_JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
  APP_DATASOURCE_POSTGRES_DSN: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgresql:5432/${POSTGRES_DB:-db}?sslmode=disable

x-db-ready: &db-ready
  postgresql:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

# Services register /healthz/liveness (see internal/service/handler/healthz.go).
x-service-base: &service-base
  restart: unless-stopped
  expose:
    - "8080"
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz/liveness || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 6
    start_period: 5s

services:
  # --- one-shot: apply migrations 000001–000005 before anything else ---
  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgresql:5432/${POSTGRES_DB:-db}?sslmode=disable"
      - "up"

  # --- one-shot: create the media bucket AND make it public-read so the
  #     browser can load images directly at http://localhost:9000/<bucket>/<key> ---
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/${MEDIA_BUCKET:-botb-media} &&
        mc anonymous set download local/${MEDIA_BUCKET:-botb-media} &&
        echo "bucket ${MEDIA_BUCKET:-botb-media} ready (public read)"

  # --- one-shot: seed SAMPLE data into Postgres + MinIO (idempotent). Built
  #     from the backend Dockerfile with SERVICE=seed (=> cmd/seed binary).
  #     The seeder needs the frontend's images, mounted read-only at /assets. ---
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: seed
    entrypoint: ["/app/bin/service"]
    environment:
      <<: *service-env
      SEED_MINIO_ENDPOINT: minio:9000
      SEED_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SEED_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SEED_MINIO_BUCKET: ${MEDIA_BUCKET:-botb-media}
      SEED_ASSETS_DIR: /assets
    volumes:
      - ./public/images:/assets/images:ro
    depends_on:
      postgresql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  competition:
    <<: *service-base
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: competition
    # MinIO endpoint so a permitted competition delete can purge that
    # competition's media objects (the media rows go in the same DB transaction).
    environment:
      <<: *service-env
      APP_DATASOURCE_MINIO_ENDPOINT: minio:9000
    depends_on:
      <<: *db-ready
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  user:
    <<: *service-base
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: user
    environment: *service-env
    depends_on: *db-ready

  draw:
    <<: *service-base
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: draw
    environment: *service-env
    depends_on: *db-ready

  # --- adminauth: independent admin identity service (internal only, no port).
  #     Signs admin JWTs with the SAME shared secret the guards verify. The
  #     first superadmin is bootstrapped from the APP_ADMINAUTH_BOOTSTRAP_* env
  #     on first boot when no superadmin exists yet (idempotent). ---
  adminauth:
    <<: *service-base
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: adminauth
    environment:
      <<: *service-env
      APP_ADMINAUTH_BOOTSTRAP_NAME: ${ADMIN_BOOTSTRAP_NAME:-Superadmin}
      APP_ADMINAUTH_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@botb.local}
      APP_ADMINAUTH_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-change-me-now}
    depends_on: *db-ready

  media:
    <<: *service-base
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: media
    environment:
      <<: *service-env
      APP_DATASOURCE_MINIO_ENDPOINT: minio:9000
    depends_on:
      <<: *db-ready
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  # --- gateway: the ONLY published API container ---
  gateway:
    <<: *service-base
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    environment:
      <<: *service-env
      APP_GATEWAY_UPSTREAMS_COMPETITION: http://competition:8080
      APP_GATEWAY_UPSTREAMS_USER: http://user:8080
      APP_GATEWAY_UPSTREAMS_DRAW: http://draw:8080
      APP_GATEWAY_UPSTREAMS_MEDIA: http://media:8080
      APP_GATEWAY_UPSTREAMS_ADMINAUTH: http://adminauth:8080
    depends_on:
      competition:
        condition: service_started
      user:
        condition: service_started
      draw:
        condition: service_started
      media:
        condition: service_started
      adminauth:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  # --- frontend: the cloned Next.js site, now data-driven from the gateway ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Browser (client fetches run in the USER's browser, not the compose net):
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${GATEWAY_PORT:-8080}
      # Media is served same-origin at /media and proxied to MinIO (see
      # MEDIA_UPSTREAM_URL + next.config rewrite), so object URLs follow the
      # server IP/host the site is opened on instead of a baked-in localhost.
      NEXT_PUBLIC_MEDIA_BASE_URL: /media
      MEDIA_UPSTREAM_URL: http://minio:9000
      # Server-side (SSR) fetches run INSIDE the compose network. The frontend
      # no longer holds any JWT secret: the winners feed reads a PUBLIC
      # endpoint, and the admin panel authenticates via the adminauth service
      # (tokens live in HttpOnly cookies on the frontend origin, proxied to the
      # gateway server-side — never in the browser or in env).
      API_BASE_URL_INTERNAL: http://gateway:8080
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      gateway:
        condition: service_started
      seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
